name: Auto-Increment Patch Version

on:
  push:
    branches: [main]
    paths:
      - 'plugins/*/skills/**'
      - 'plugins/*/references/**'
      - 'plugins/*/assets/**'

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Bump patch version for changed plugins
        run: |
          for plugin_dir in plugins/*/; do
            plugin_json="$plugin_dir/.claude-plugin/plugin.json"
            [ -f "$plugin_json" ] || continue

            # Check if this plugin had changes in this push
            plugin_name=$(basename "$plugin_dir")
            changed=$(git diff --name-only HEAD~1 HEAD -- "$plugin_dir" | grep -v '.claude-plugin/plugin.json' | head -1)
            [ -z "$changed" ] && continue

            # Read current version and bump patch
            current=$(jq -r '.version' "$plugin_json")
            major=$(echo "$current" | cut -d. -f1)
            minor=$(echo "$current" | cut -d. -f2)
            patch=$(echo "$current" | cut -d. -f3)
            new_patch=$((patch + 1))
            new_version="$major.$minor.$new_patch"

            echo "Bumping $plugin_name: $current -> $new_version"

            # Update plugin.json
            jq --arg ver "$new_version" '.version = $ver' "$plugin_json" > /tmp/plugin.json \
              && mv /tmp/plugin.json "$plugin_json"

            # Update SKILL.md frontmatter
            skill_md="$plugin_dir/skills/$plugin_name/SKILL.md"
            if [ -f "$skill_md" ]; then
              sed -i "s/^version: .*/version: $new_version/" "$skill_md"
            fi

            # Update marketplace.json
            jq --arg name "$plugin_name" --arg ver "$new_version" \
              '(.plugins[] | select(.name == $name)).version = $ver' \
              .claude-plugin/marketplace.json > /tmp/marketplace.json \
              && mv /tmp/marketplace.json .claude-plugin/marketplace.json

            # Update README.md version column only (preserve description)
            sed -i "s/| \`$plugin_name\` |\(.*\)| [0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]* |/| \`$plugin_name\` |\1| $new_version |/" README.md
          done

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit version bump
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: auto-bump patch version"
          git push
