<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  /* Customize these CSS custom properties per project */
  :root {
    --bg-primary: #0d0618;
    --bg-secondary: #1a0a2e;
    --bg-tertiary: #0f0520;
    --accent-glow-1: rgba(139, 92, 246, 0.15);
    --accent-glow-2: rgba(99, 102, 241, 0.1);
    --accent-glow-3: rgba(168, 85, 247, 0.08);
    --accent-solid: #a78bfa;
    --accent-secondary: #818cf8;
    --border-color: rgba(139, 92, 246, 0.4);
    --text-primary: white;
    --text-secondary: rgba(255, 255, 255, 0.85);
    --text-muted: rgba(255, 255, 255, 0.7);
    --problem-color: #fca5a5;
    --problem-accent: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--text-primary);
  }

  .bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 40%, var(--bg-tertiary) 100%);
  }

  /* Smoke-like ambient glow */
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 30% 50%, var(--accent-glow-1) 0%, transparent 70%),
      radial-gradient(ellipse 500px 300px at 70% 40%, var(--accent-glow-2) 0%, transparent 70%),
      radial-gradient(ellipse 300px 200px at 50% 60%, var(--accent-glow-3) 0%, transparent 70%);
  }

  .content {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px;
  }

  /* SVG logo sizing */
  .logo-svg {
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .logo-svg svg {
    height: 100%;
    width: auto;
  }

  /* Intro/Outro: Logo centered */
  .slide-intro .logo-container {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 40px;
  }

  .slide-intro .border-frame {
    position: absolute;
    inset: 40px;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    pointer-events: none;
  }

  /* Title card */
  .slide-title h1 {
    font-size: 54px;
    font-weight: 700;
    text-align: center;
    line-height: 1.2;
    margin-bottom: 16px;
  }

  .slide-title .subtitle {
    font-size: 26px;
    font-weight: 300;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 1px;
  }

  /* Stat callout card */
  .slide-stat .stat-number {
    font-size: 140px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent-solid), var(--accent-secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
    margin-bottom: 16px;
  }

  .slide-stat .stat-label {
    font-size: 36px;
    font-weight: 400;
    color: var(--text-secondary);
    text-align: center;
    letter-spacing: 2px;
  }

  /* Section divider */
  .slide-section h2 {
    font-size: 48px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 12px;
  }

  .slide-section .section-line {
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, var(--accent-solid), var(--accent-secondary));
    border-radius: 2px;
    margin-bottom: 20px;
  }

  .slide-section .section-desc {
    font-size: 26px;
    font-weight: 300;
    color: var(--text-muted);
    text-align: center;
    max-width: 800px;
    line-height: 1.5;
  }

  /* Problem statement */
  .slide-problem {
    align-self: flex-start;
    padding-left: 80px;
  }

  .slide-problem h2 {
    font-size: 44px;
    font-weight: 600;
    text-align: left;
    margin-bottom: 28px;
    color: var(--problem-color);
  }

  .problem-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .problem-list li {
    font-size: 30px;
    font-weight: 400;
    color: var(--text-secondary);
    padding: 14px 0;
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .problem-x {
    font-size: 24px;
    color: var(--problem-accent);
    font-weight: 700;
    flex-shrink: 0;
  }

  /* Benefits list */
  .slide-benefits {
    align-self: flex-start;
    padding-left: 80px;
  }

  .slide-benefits h2 {
    font-size: 44px;
    font-weight: 600;
    text-align: left;
    margin-bottom: 28px;
  }

  .slide-benefits .section-line {
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, var(--accent-solid), var(--accent-secondary));
    border-radius: 2px;
    margin-bottom: 20px;
  }

  .benefits-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .benefits-list li {
    font-size: 30px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.9);
    padding: 14px 0;
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .benefit-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-solid), var(--accent-secondary));
    flex-shrink: 0;
  }

  /* Outro */
  .slide-outro .tagline {
    font-size: 32px;
    font-weight: 300;
    color: var(--text-muted);
    text-align: center;
    margin-top: 30px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="content" id="slide-content">
    <!-- CONTENT -->
  </div>
</body>
</html>
